<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生列表</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-info bg-opacity-25">
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0"><i class="fas fa-users"></i> 学生列表</h3>
        </div>
        <div class="card-body">
            <!-- 搜索框 -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <form th:action="@{/student/list}" method="get" class="input-group">
                        <input type="text" name="keyword" class="form-control" placeholder="按学号/姓名搜索" th:value="${keyword}">
                        <button type="submit" class="btn btn-outline-primary">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                        <a th:href="@{/student/list}" class="btn btn-outline-secondary">
                            <i class="fas fa-undo"></i> 重置
                        </a>
                    </form>
                </div>
                <div class="col-md-8 text-end">
                    <a th:href="@{/student/add}" class="btn btn-success">
                        <i class="fas fa-plus"></i> 新增学生
                    </a>
                    <button id="batchDeleteBtn" class="btn btn-danger" onclick="batchDelete()">
                        <i class="fas fa-trash-alt"></i> 批量删除
                    </button>
                </div>
            </div>

            <table class="table table-striped table-hover">
                <thead class="bg-primary text-white">
                <tr>
                    <th><input type="checkbox" id="selectAll" onclick="toggleAll()" class="form-check-input"></th>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>班级</th>
                    <th>出生日期</th>
                    <th>电话</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student : ${students}">
                    <td><input type="checkbox" class="student-checkbox form-check-input" th:value="${student.id}"></td>
                    <td th:text="${student.studentId}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.gender}"></td>
                    <td th:text="${student.className}"></td>
                    <td th:text="${student.birthDate}"></td>
                    <td th:text="${student.phone}"></td>
                    <td>
                        <a th:href="@{/student/edit/{id}(id=${student.id})}" class="btn btn-sm btn-info">
                            <i class="fas fa-edit"></i> 编辑
                        </a>
                        <a th:href="@{/student/delete/{id}(id=${student.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除该学生吗？')">
                            <i class="fas fa-trash"></i> 删除
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- 分页 -->
            <nav th:if="${totalPages > 0}">
                <ul class="pagination">
                    <li th:class="${currentPage == 1} ? 'page-item disabled' : 'page-item'">
                        <a th:href="@{/student/list(page=${currentPage - 1}, size=${size}, keyword=${keyword}, sortField=${sortField}, sortDirection=${sortDirection})}" class="page-link">
                            <i class="fas fa-chevron-left"></i> 上一页
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(1, totalPages)}" th:class="${i == currentPage} ? 'page-item active' : 'page-item'">
                        <a th:href="@{/student/list(page=${i}, size=${size}, keyword=${keyword}, sortField=${sortField}, sortDirection=${sortDirection})}" class="page-link" th:text="${i}"></a>
                    </li>
                    <li th:class="${currentPage == totalPages} ? 'page-item disabled' : 'page-item'">
                        <a th:href="@{/student/list(page=${currentPage + 1}, size=${size}, keyword=${keyword}, sortField=${sortField}, sortDirection=${sortDirection})}" class="page-link">
                            下一页 <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script>
    function toggleAll() {
        var selectAll = document.getElementById('selectAll');
        var checkboxes = document.querySelectorAll('.student-checkbox');
        checkboxes.forEach(function(cb) {
            cb.checked = selectAll.checked;
        });
    }

    function batchDelete() {
        var checkedIds = [];
        document.querySelectorAll('.student-checkbox:checked').forEach(function(cb) {
            checkedIds.push(cb.value);
        });
        if (checkedIds.length === 0) {
            alert('请先选择要删除的学生');
            return;
        }
        if (confirm('确定要删除选中的 ' + checkedIds.length + ' 个学生吗？')) {
            window.location.href = '/student/batchDelete?ids=' + checkedIds.join(',');
        }
    }
</script>
</body>
</html>
