<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生表单</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-info bg-opacity-25">
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0"><i class="fas fa-user-graduate"></i> 学生信息</h3>
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger">
                <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/student/save}" th:method="post" th:object="${student}" id="studentForm">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-id-card"></i> 学号：<span class="text-danger">*</span></label>
                    <input type="text" th:field="*{studentId}" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user"></i> 姓名：<span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-venus-mars"></i> 性别：</label>
                    <select th:field="*{gender}" class="form-select">
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-school"></i> 班级：</label>
                    <input type="text" th:field="*{className}" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-calendar"></i> 出生日期：</label>
                    <input type="date" th:field="*{birthDate}" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-phone"></i> 联系电话：</label>
                    <input type="tel" th:field="*{phone}" class="form-control" pattern="1[3-9][0-9]{9}" />
                    <small class="text-muted">请输入11位手机号码</small>
                </div>

                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> 保存
                </button>
                <a th:href="@{/student/list}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> 返回
                </a>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('studentForm').addEventListener('submit', function(e) {
        var phone = document.querySelector('[name="phone"]').value;
        var phonePattern = /^1[3-9][0-9]{9}$/;
        if (phone && !phonePattern.test(phone)) {
            alert('请输入正确的11位手机号码');
            e.preventDefault();
        }
    });
</script>
</body>
</html>
